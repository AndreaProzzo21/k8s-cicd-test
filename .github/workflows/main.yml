name: Build and Push to GHCR

on:
  push:
    branches: [ main ] # Si attiva quando pushi sul branch main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Step per gestire il nome utente/repo con maiuscole
      - name: Prepare image tag
        run: |
          # Prende il nome repo (es. AndreaProzzo21/repo) e lo trasforma in minuscolo
          echo "IMAGE_TAG=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Usa la variabile calcolata nello step precedente
          tags: ${{ env.IMAGE_TAG }}