name: Build and Push to GHCR

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Prepare image tag
        # Usiamo l'ID dello step per essere sicuri di recuperare il valore
        id: prep
        run: |
          TAG="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest"
          echo "tag=${TAG,,}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Recuperiamo il valore dall'output dello step 'prep'
          tags: ${{ steps.prep.outputs.tag }}