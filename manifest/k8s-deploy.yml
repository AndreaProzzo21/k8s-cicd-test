apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: flask-container
          image: ghcr.io/andreaprozzo21/k8s-cicd-test:latest
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "64Mi"    
              cpu: "100m"       
            limits:
              memory: "128Mi"   
              cpu: "500m"       
---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  type: NodePort
  selector:
    app: flask-app
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30007